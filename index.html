<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Coopers</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; background: #f0eee9; }
      body {
        font-family: 'Inter', -apple-system, system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { height: 100%; }

      @keyframes screenSlideIn {
        from { transform: translateX(32px); opacity: 0; }
        to   { transform: translateX(0);    opacity: 1; }
      }
      @keyframes screenSlideBack {
        from { transform: translateX(-24px); opacity: 0; }
        to   { transform: translateX(0);     opacity: 1; }
      }
      .screen-forward { animation: screenSlideIn  0.28s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards; }
      .screen-back    { animation: screenSlideBack 0.22s ease-out forwards; }
      .screen-instant { /* no animation */ }

      @keyframes confettiFall {
        0%   { transform: translateY(-10px) rotate(0deg);   opacity: 1; }
        80%  { opacity: 1; }
        100% { transform: translateY(900px) rotate(540deg); opacity: 0; }
      }
      .confetti-piece {
        animation: confettiFall 2.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
      }
      @keyframes levelBadgePop {
        from { transform: scale(0.4); opacity: 0; }
        to   { transform: scale(1);   opacity: 1; }
      }
    </style>
