name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: AIzaSyAeofy5FyxdHFHC8Vt0LzlpyNBbhCYPZ5E
          VITE_FIREBASE_AUTH_DOMAIN: coopers-18d46.firebaseapp.com
          VITE_FIREBASE_PROJECT_ID: coopers-18d46
          VITE_FIREBASE_STORAGE_BUCKET: coopers-18d46.firebasestorage.app
          VITE_FIREBASE_MESSAGING_SENDER_ID: "894995293468"
          VITE_FIREBASE_APP_ID: "1:894995293468:web:c12ee9ed46581031d346d9"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - id: deployment
        uses: actions/deploy-pages@v4
